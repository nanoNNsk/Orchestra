<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orchestra</title>
<style>
  :root{--bg:#0f1117;--card:#181b24;--line:#272b36;--ink:#e6e8ee;--dim:#9aa0ad;--accent:#7c9cff;--you:#243047;--done:#57d9a3;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.55 -apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);}
  header b{font-size:1.1rem;} header .sub{color:var(--dim);font-size:.82rem;margin-right:auto;}
  header button{background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:8px;
    padding:7px 12px;font-size:.85rem;cursor:pointer;}
  header button:hover{border-color:var(--accent);}

  .body{flex:1;display:flex;min-height:0;position:relative;}
  #log{flex:1;overflow-y:auto;padding:20px;}
  .col{max-width:760px;margin:0 auto;}
  .msg{margin:0 0 16px;display:flex;flex-direction:column;}
  .msg .who{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:4px;}
  .bubble{padding:11px 15px;border-radius:12px;white-space:pre-wrap;}
  .you .bubble{background:var(--you);align-self:flex-end;max-width:80%;}
  .ceo .bubble{background:var(--card);border:1px solid var(--line);max-width:90%;}
  .trace{font-size:.78rem;color:var(--dim);border-left:2px solid var(--line);padding:2px 0 2px 10px;margin:2px 0 8px;}
  .trace div{padding:1px 0;}
  .empty{color:var(--dim);text-align:center;margin-top:40px;font-size:.9rem;}

  form{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line);}
  form .col{display:flex;gap:10px;width:100%;}
  input{flex:1;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 14px;font:inherit;}
  input:focus{outline:none;border-color:var(--accent);}
  .send{background:var(--accent);color:#0f1117;border:0;border-radius:10px;padding:0 20px;font-weight:700;cursor:pointer;}
  .send:disabled{opacity:.5;cursor:default;}

  /* Company drawer */
  #drawer{width:320px;flex:0 0 320px;border-left:1px solid var(--line);background:#13161e;
    overflow-y:auto;transition:margin-right .2s;}
  #drawer.hidden{margin-right:-321px;}
  .dhead{padding:14px 16px 10px;position:sticky;top:0;background:#13161e;border-bottom:1px solid var(--line);}
  .dhead b{font-size:.95rem;}
  .stat{color:var(--dim);font-size:.82rem;margin-top:4px;}
  .dbody{padding:8px 10px 24px;}
  details{margin:2px 0;}
  summary{cursor:pointer;list-style:none;padding:5px 8px;border-radius:7px;font-size:.88rem;}
  summary::-webkit-details-marker{display:none;}
  summary:hover{background:var(--card);}
  .dept>summary{font-weight:600;}
  .dept{border-bottom:1px solid var(--line);padding-bottom:2px;}
  .role{margin-left:12px;}
  .role>summary{color:#cdd6ff;}
  .skl{margin-left:24px;}
  .skl>summary{color:var(--dim);font-size:.83rem;}
  .skldesc{margin-left:34px;font-size:.8rem;color:var(--dim);padding:2px 8px 6px;}
  .skldesc .has{color:#9db4ff;}
  .count{color:var(--dim);font-weight:400;font-size:.8rem;}
  .new{color:var(--done);font-size:.72rem;margin-left:5px;}
  .ro{color:var(--dim);font-size:.72rem;text-align:center;padding:10px;}

  #toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:var(--done);
    color:#0f1117;font-weight:600;padding:9px 16px;border-radius:10px;font-size:.88rem;opacity:0;
    transition:opacity .25s;pointer-events:none;}
  #toast.show{opacity:1;}
</style>
</head>
<body>
  <header>
    <b>🎻 Orchestra</b>
    <span class="sub">you are the Chairman — talk to the CEO</span>
    <button id="clear" title="Clears your view only — the company keeps its memory">Clear</button>
    <button id="toggle">🏛 Company</button>
  </header>

  <div class="body">
    <div id="log"><div class="col" id="logcol"></div></div>

    <aside id="drawer" class="hidden">
      <div class="dhead"><b>🏛 The Company</b><div class="stat" id="stat">loading…</div></div>
      <div class="dbody" id="tree"></div>
      <div class="ro">read-only · manage via <code>npm run status</code></div>
    </aside>

    <div id="toast"></div>
  </div>

  <form id="f"><div class="col">
    <input id="m" placeholder="Tell the CEO what you want…" autocomplete="off" autofocus>
    <button class="send" id="send">Send</button>
  </div></form>

<script>
const logcol = document.getElementById("logcol");
const form = document.getElementById("f"), input = document.getElementById("m"), send = document.getElementById("send");
const drawer = document.getElementById("drawer");
const KEY = "orchestra-chat";
const newHires = new Set();   // role ids hired this session → 🆕 badge

// ---------- conversation history (localStorage) ----------
let entries = JSON.parse(localStorage.getItem(KEY) || "[]");
function saveChat(){ localStorage.setItem(KEY, JSON.stringify(entries)); }

function renderEntry(e){
  if (e.type === "trace"){
    const t = document.createElement("div");
    t.className = "trace";
    t.innerHTML = e.items.map(s => `<div>· ${escapeHtml(s)}</div>`).join("");
    logcol.appendChild(t);
    return;
  }
  const el = document.createElement("div");
  el.className = "msg " + (e.type === "you" ? "you" : "ceo");
  el.innerHTML = `<div class="who"></div><div class="bubble"></div>`;
  el.querySelector(".who").textContent = e.type === "you" ? "Chairman" : "CEO";
  el.querySelector(".bubble").textContent = e.text;
  logcol.appendChild(el);
}
function escapeHtml(s){ return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function addEntry(e){ entries.push(e); saveChat(); renderEntry(e); scroll(); }
function scroll(){ const l = document.getElementById("log"); l.scrollTop = l.scrollHeight; }

function paintHistory(){
  logcol.innerHTML = "";
  if (!entries.length){ logcol.innerHTML = `<div class="empty">No messages yet. Ask the company something.</div>`; return; }
  entries.forEach(renderEntry); scroll();
}

document.getElementById("clear").onclick = () => {
  if (!confirm("Clear this conversation?\n(Your view only — the company keeps its memory.)")) return;
  entries = []; saveChat(); paintHistory();
};

// ---------- Company drawer ----------
document.getElementById("toggle").onclick = () => drawer.classList.toggle("hidden");

async function loadRoster(){
  let data; try { data = await (await fetch("/roster")).json(); } catch { return; }
  const skillDesc = Object.fromEntries(data.skills.map(s => [s.id, s.description]));
  // reverse index: skill id → role ids that have it
  const rolesBySkill = {};
  for (const r of data.roles) for (const sk of r.skills) (rolesBySkill[sk] ||= []).push(r.id);

  document.getElementById("stat").textContent =
    `${data.roles.length} roles · ${data.departments.length} departments · ${data.skills.length} skills`;

  const tree = document.getElementById("tree"); tree.innerHTML = "";
  for (const dept of data.departments){
    const roles = data.roles.filter(r => r.department === dept.id);
    const d = document.createElement("details"); d.className = "dept";
    d.innerHTML = `<summary>${dept.id} <span class="count">(${roles.length})</span></summary>`;
    for (const r of roles){
      const rd = document.createElement("details"); rd.className = "role";
      const isNew = newHires.has(r.id) ? `<span class="new">🆕</span>` : "";
      rd.innerHTML = `<summary>${r.id}${isNew} <span class="count">${r.id===dept.head?"· head":""}</span></summary>`;
      const desc = document.createElement("div"); desc.className = "skldesc"; desc.textContent = r.description;
      rd.appendChild(desc);
      for (const sk of (r.skills.length ? r.skills : [])){
        const sd = document.createElement("details"); sd.className = "skl";
        sd.innerHTML = `<summary>${sk}</summary>`;
        const body = document.createElement("div"); body.className = "skldesc";
        const others = (rolesBySkill[sk] || []).filter(x => x !== r.id);
        body.innerHTML = `${escapeHtml(skillDesc[sk] || "")}` +
          (others.length ? `<br><span class="has">also: ${others.join(", ")}</span>` : "");
        sd.appendChild(body); rd.appendChild(sd);
      }
      if (!r.skills.length){
        const none = document.createElement("div"); none.className = "skldesc"; none.textContent = "skills: (none)";
        rd.appendChild(none);
      }
      d.appendChild(rd);
    }
    tree.appendChild(d);
  }
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3200);
}

// ---------- send ----------
form.onsubmit = async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;
  input.value = ""; send.disabled = true;
  if (entries.length === 0) logcol.innerHTML = "";
  addEntry({ type: "you", text: message });
  const pending = document.createElement("div");
  pending.className = "msg ceo";
  pending.innerHTML = `<div class="who">CEO</div><div class="bubble">…thinking, delegating…</div>`;
  logcol.appendChild(pending); scroll();

  try {
    const r = await fetch("/ask", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ message }) });
    const data = await r.json();
    pending.remove();
    if (data.error){ addEntry({ type:"ceo", text:"Error: " + data.error }); }
    else {
      addEntry({ type:"trace", items: data.trace });
      addEntry({ type:"ceo", text: data.reply });
      if (data.hired && data.roleId){
        newHires.add(data.roleId);
        toast(`🆕 ${data.roleId} joined ${data.department}`);
        if (drawer.classList.contains("hidden")) drawer.classList.remove("hidden");
      }
      loadRoster(); // refresh so new hires / changes show
    }
  } catch (err) {
    pending.remove(); addEntry({ type:"ceo", text:"Error: " + err.message });
  } finally { send.disabled = false; input.focus(); }
};

// ---------- boot ----------
paintHistory();
loadRoster();
</script>
</body>
</html>
